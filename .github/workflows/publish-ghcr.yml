# Manual-only GHCR publisher for the CAR-bench Track 2 (Cerebras planner/executor) agent.
# Dispatch from the Actions tab and type PUBLISH to build + push a linux/amd64 image.
# Uses the Actions GITHUB_TOKEN (packages: write) — no local Docker or extra PAT needed.
# After the first push, mark the ghcr.io/<owner>/car-bench-agent-under-test package Public,
# then pin the submission by the digest printed in the run summary.

name: Publish Agent Under Test To GHCR

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type PUBLISH to push images to GHCR"
        required: true
        type: string

jobs:
  publish:
    if: inputs.confirm_publish == 'PUBLISH'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: car-bench-agent-under-test
            dockerfile: src/track_2_agent_under_test_cerebras_planner/Dockerfile.track-2-agent-under-test-cerebras-planner

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch CAR-bench (evaluator path dependency for uv sync)
        run: ./scripts/setup_car_bench.sh

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image (${{ matrix.name }})
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Output image digest
        run: |
          echo "## Docker Image Published: ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
